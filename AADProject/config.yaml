# ============================================================
# 1. Preprocessing stages
# ============================================================
#datasets?
Datasets:
  DTU: True
  DAS: True

#preprocessing?
Do_envelope_extraction: False
Do_preprocessing: True



# ============================================================
# 2. Subject selection
# ============================================================

subjects_DAS:
  all: [S1,S2,S3,S4,S5,S6,S7,S8,S9,S10,S11,S12,S13,S14,S15,S16]
  small: [S10]


subjects_DTU:
  all: [S1,S2,S3,S4,S5,S6,S7,S8,S9,S10,S11,S12,S13,S14,S15,S16,S17,S18]
  small: [S10]

subjects:
  all: [S1_DAS,S2_DAS,S3_DAS,S4_DAS,S5_DAS,S6_DAS,S7_DAS,S8_DAS,S9_DAS,S10_DAS,S11_DAS,S12_DAS,S13_DAS,S14_DAS,S15_DAS,S16_DAS,S1_DTU,S2_DTU,S3_DTU,S4_DTU,S5_DTU,S6_DTU,S7_DTU,S8_DTU,S9_DTU,S10_DTU,S11_DTU,S12_DTU,S13_DTU,S14_DTU,S15_DTU,S16_DTU,S17_DTU,S18_DTU]
  small: [S10_DTU,S10_DAS]
  
use_subjects: "small"

SI_mode:
  mode: "separate"     # "separate" or "mixed" (datasets separate or merged for training)
  


# ============================================================
# 3. Preprocessing settings
# ============================================================
preprocessing:
  target_fs: 32   #Hz -- min 18Hz
  band: [1, 9]    #Hz
  rereference_method: "mean"
  plotting:
    enable: false
    seconds: 30
    show_preprocessing_steps: False
  target_n_channels: 64



# ============================================================
# 4. Backward model (mTRF) settings
# ============================================================
backward_model:
  window_s: 30
  step_s: 1
  lag_ms: [-100, 400]
  multiband: true


# ============================================================
# 5. Deep Learning section
# ============================================================

# DLModel Parameters -----------------------------------------------
DeepLearning:
  data_windows:
    window_len_s: 5.0
    window_step_s: 2.5

  train:
    batch_size: 8
    num_epochs: 20
    learning_rate: 3e-4
    weight_decay: 1e-4
    patience: 8

  model:
    architecture: "w_transformer"   #or wo_transformer
    eeg_encoder:
      d_model: 64
      n_heads: 4
      n_layers: 3
    audio_encoder:
      d_model: 64
      n_heads: 4
      n_layers: 1
    contrastive:
      temperature: 0.07

  quick_test:
    enable: False
    max_windows: 200
    max_epochs: 3
    use_subjects: "debug"








