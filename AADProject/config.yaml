# Directory Paths ---------------------------

# base_dir: Path to the root folder of the whole project, containing everything.
# Data_Das2019
#  - RawEEG_dir=Location of the raw EEG files.
#  - stim_dir: Folder with audio stimuli (.wav) used in the attention experiment.
#
# Data_ModelInput
#  - Env_dir: contains envelopes of the corresponding stimuli
#  - EEG_PP:contains preprocessed EEGData in .nwb format
#
# Results_dir: contains final classification accuracies, correlations, and plots.
# Preprocessing config ---------------------------

#target_fs:
#  frequency to which eeg and envelopes are downsampled. This dramatically reduces data size
#  Can be 2 times the bandwidth at its lowest (2 FN)
#band:
#  Speech envelope tracking (cortical entrainment) occurs primarily in the delta (0.5–4 Hz) and theta (4–8 Hz) ranges
#  Filter out noise while keeping most relevant envelope information
#plot:
#  plot 30s chuncks of EEG/envelopes for visual inspection

target_fs: 32   #Hz -- min 18Hz
band: [1, 9]    #Hz
rereference_method: "mean"

plot_seconds: 30  #s
plot_EEGPP_steps: False
plot_EnvelopeExtr: False

# backward model ---------------------------
#Decision_window:
#  model evaluates on 30s windows
#  trade off between longer windows (higher accuracy) & shorter windows (less decision time)
#
#Decision_step:
#  overlapping windows: 30s window slides by 1s
#  why?
#
#lag_ms:
#  defines temporal integration window over the mTRF
#  - cortical responses ~100ms
#  - use longer windows to capture more complex relations + artefact calibration

decision_window: 30  #s
decision_step: 1     #s
lag_ms: [-100, 400]  #ms
multiband: True


# What steps do you want to do? ---------------------------
Do_envelope_extraction: True
Do_preprocessing: True
Do_BackwardModel: False


# Subjects to process ---------------------------
subjects:
  - S1
  - S2
  - S3
  - S4
  - S5
  - S6
  - S7
  - S8
  - S9
  - S10
  - S11
  - S12
  - S13
  - S14
  - S15
  - S16


##Deep learning section:
DeepLearning:
  use_gpu: true
  window_len_s: 5.0
  window_step_s: 2.5
  batch_size: 32
  num_epochs: 30
  learning_rate: 1e-3
  weight_decay: 1e-4
  patience: 5
  eeg_encoder:
    d_model: 64
    n_heads: 4
    n_layers: 4
  audio_encoder:
    d_model: 64
    n_heads: 4
    n_layers: 2
  contrastive:
    temperature: 0.07

train_subjects:
  - S1
  - S2

val_subjects:
  - S3



