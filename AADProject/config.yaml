# Preprocessing config
"""
target_fs: 
  frequency to which eeg and envelopes are downsampled. 
  Can be 2 times the bandwidth at its lowest (2 FN)
band: 
  Speech envelope tracking (cortical entrainment) occurs primarily in the delta (0.5–4 Hz) and theta (4–8 Hz) ranges
"""
target_fs: 32  #min 18Hz
band: [1, 9]

plot_seconds: 30
plot_steps: False
plot_Envelope_Checks: False

# backward model
decision_window: 30 #s
decision_step: 1 #s
lambda_val: 1000
lag_ms: [-100, 400]  #ms

# What steps
Do_preprocessing: True
Do_BackwardModel: True

# Subjects to process
subjects:
  - S1
  - S2
  - S3
  - S4
  - S5
  - S6
  - S7
  - S8
  - S9
  - S10
