

# ============================================================
# 1. Preprocessing stages
# ============================================================
Do_envelope_extraction: True
Do_preprocessing: True



# ============================================================
# 2. Subject selection
# ============================================================
subjects:
  all: [S1,S2,S3,S4,S5,S6,S7,S8,S9,S10,S11,S12,S13,S14,S15,S16]
  medium: [S1,S2,S3]
  small: [S1,S2]
use_subjects: "medium"


splits:
  mode: "single"     # "single" | "loso"
  single:
    train: [S1,S2,S3,S4,S5,S6,S7,S8,S9,S10,S11,S12,S13,S14,S15,S16]
    val: [S1]


# ============================================================
# 3. Preprocessing settings
# ============================================================
preprocessing:
  target_fs: 32   #Hz -- min 18Hz
  band: [1, 9]    #Hz
  rereference_method: "Cz"
  plotting:
    enable: false
    seconds: 30
    show_preprocessing_steps: False



# ============================================================
# 4. Backward model (mTRF) settings
# ============================================================
backward_model:
  window_s: 5
  step_s: 1
  lag_ms: [-100, 400]
  multiband: true


# ============================================================
# 5. Deep Learning section
# ============================================================

# DLModel Parameters -----------------------------------------------
DeepLearning:
  data_windows:
    window_len_s: 5.0
    window_step_s: 2.5

  train:
    batch_size: 8
    num_epochs: 20
    learning_rate: 3e-4
    weight_decay: 1e-4
    patience: 8

  model:
    architecture: "w_transformer"   #or wo_transformer
    eeg_encoder:
      d_model: 64
      n_heads: 4
      n_layers: 3
    audio_encoder:
      d_model: 64
      n_heads: 4
      n_layers: 1
    contrastive:
      temperature: 0.07

  quick_test:
    enable: False
    max_windows: 200
    max_epochs: 3
    use_subjects: "debug"








