# Preprocessing config ---------------------------

#target_fs:
#  frequency to which eeg and envelopes are downsampled. This dramatically reduces data size
#  Can be 2 times the bandwidth at its lowest (2 FN)
#band:
#  Speech envelope tracking (cortical entrainment) occurs primarily in the delta (0.5–4 Hz) and theta (4–8 Hz) ranges
#  Filter out noise while keeping most relevant envelope information
#plot:
#  plot 30s chuncks of EEG/envelopes for visual inspection

target_fs: 32   #Hz -- min 18Hz
band: [1, 9]    #Hz
rereference_method: "Cz"

plot_seconds: 30  #s
plot_EEGPP_steps: False
plot_EnvelopeExtr: False

# backward model ---------------------------
#Decision_window:
#  model evaluates on 30s windows
#  trade off between longer windows (higher accuracy) & shorter windows (less decision time)
#
#Decision_step:
#  overlapping windows: 30s window slides by 1s
#  why?
#
#lag_ms:
#  defines temporal integration window over the mTRF
#  - cortical responses ~100ms
#  - use longer windows to capture more complex relations + artefact calibration

decision_window: 30  #s
decision_step: 1     #s
lag_ms: [-100, 400]  #ms
multiband: True


# What steps do you want to do? ---------------------------
Do_envelope_extraction: False
Do_preprocessing: True
Do_BackwardModel: True


